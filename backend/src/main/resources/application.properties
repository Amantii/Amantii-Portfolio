spring.application.name=portfolio

# DataSource — local dev values (override with env vars in prod)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/portfolio_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:amantiisamson}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Virtual threads (Java 21)
spring.threads.virtual.enabled=true

# Server
server.port=8080
